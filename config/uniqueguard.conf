# =====================================================================
# UniqueGuard Firewall Configuration
# Created by: mr-unique
# Project: UniqueGuard - VPS/VDS Firewall & Anti-DDoS System
# =====================================================================

# ---------------------------------------------------------------------
# General Firewall Settings
# ---------------------------------------------------------------------
ENABLE_FIREWALL="true"
DEFAULT_INPUT_POLICY="DROP"
DEFAULT_OUTPUT_POLICY="ACCEPT"
DEFAULT_FORWARD_POLICY="ACCEPT"

# ---------------------------------------------------------------------
# Pterodactyl Panel & Wings Integration
# Auto-whitelists Docker bridges, Wings ports, and game allocations
# ---------------------------------------------------------------------
PTERODACTYL_MODE="true"
PTERODACTYL_WEB_PORTS="80,443"
PTERODACTYL_WINGS_PORTS="8080,2022"
DOCKER_INTERFACES="docker0 pterodactyl0"
AUTO_DETECT_WINGS_ALLOCATIONS="true"

# ---------------------------------------------------------------------
# Open Ports (Comma separated)
# Example: TCP_IN="22,80,443,8080,2022"
# Example: UDP_IN="25565,27015"
# ---------------------------------------------------------------------
TCP_IN="22,80,443,8080,2022"
UDP_IN=""

# Custom Port Ranges (Format: start:end)
# Example: TCP_PORT_RANGES="25565:25600 27015:27050"
TCP_PORT_RANGES=""
UDP_PORT_RANGES="25565:25600 27015:27050 7777:7800"

# ---------------------------------------------------------------------
# IP Whitelist & Blacklist
# Space-separated IP addresses or CIDR notations (e.g. "1.2.3.4 10.0.0.0/8")
# ---------------------------------------------------------------------
WHITELIST_IPS="127.0.0.1 ::1"
BLACKLIST_IPS=""

# ---------------------------------------------------------------------
# Anti-DDoS & Security Hardening Settings
# ---------------------------------------------------------------------
ENABLE_ANTI_DDOS="true"

# SYN Flood Protection (Max connection bursts per second)
SYN_FLOOD_PROTECTION="true"
SYN_FLOOD_LIMIT="25/s"
SYN_FLOOD_BURST="50"

# UDP Flood Protection
UDP_FLOOD_PROTECTION="true"
UDP_FLOOD_LIMIT="60/s"
UDP_FLOOD_BURST="120"

# ICMP / Ping Flood Protection
PING_FLOOD_PROTECTION="true"
PING_LIMIT="5/s"
PING_BURST="10"

# Rate Limit Max Concurrent Connections Per IP (Prevents HTTP/SSH brute force)
MAX_CONN_PER_IP="30"

# Drop Invalid / Malformed / Stealth Scan Packets
DROP_INVALID_PACKETS="true"
DROP_STEALTH_SCANS="true"

# ---------------------------------------------------------------------
# Logging Configuration
# ---------------------------------------------------------------------
ENABLE_LOGGING="true"
LOG_LIMIT="5/m"
LOG_PREFIX="[UniqueGuard-DROP] "
