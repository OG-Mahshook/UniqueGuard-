# =====================================================================
# UNIQUE GUARD Firewall & Anti-DDoS Configuration
# Author & Copyright: mr-unique
# Project: UNIQUE GUARD - VPS/VDS Security & Pterodactyl Shield
# =====================================================================

# ---------------------------------------------------------------------
# General Firewall Core Settings
# ---------------------------------------------------------------------
ENABLE_FIREWALL="true"
DEFAULT_INPUT_POLICY="DROP"
DEFAULT_OUTPUT_POLICY="ACCEPT"
DEFAULT_FORWARD_POLICY="ACCEPT"

# ---------------------------------------------------------------------
# Pterodactyl Panel & Wings Auto-Shield Integration
# ---------------------------------------------------------------------
PTERODACTYL_MODE="true"
PTERODACTYL_WEB_PORTS="80,443"
PTERODACTYL_WINGS_PORTS="8080,2022"
DOCKER_INTERFACES="docker0 pterodactyl0"
AUTO_DETECT_WINGS_ALLOCATIONS="true"

# ---------------------------------------------------------------------
# Open Ports (Comma-separated)
# ---------------------------------------------------------------------
TCP_IN="22,80,443,8080,2022"
UDP_IN=""

# Custom Port Ranges (Format: start:end)
TCP_PORT_RANGES=""
UDP_PORT_RANGES="25565:25600 27015:27050 7777:7800"

# ---------------------------------------------------------------------
# IP Whitelist & Blacklist
# Space-separated IP addresses or CIDR notations
# ---------------------------------------------------------------------
WHITELIST_IPS="127.0.0.1 ::1"
BLACKLIST_IPS=""

# Dynamic Hostname Whitelisting (Space-separated domain names / DDNS)
WHITELIST_HOSTNAMES=""

# GeoIP Country Code Blacklist (Space-separated ISO 2-letter codes, e.g. "cn ru kp")
GEOIP_BLOCK_COUNTRIES=""

# ---------------------------------------------------------------------
# Anti-DDoS & Traffic Hardening Thresholds
# ---------------------------------------------------------------------
ENABLE_ANTI_DDOS="true"

# TCP SYN Flood Mitigation
SYN_FLOOD_PROTECTION="true"
SYN_FLOOD_LIMIT="25/s"
SYN_FLOOD_BURST="50"

# UDP Flood Mitigation
UDP_FLOOD_PROTECTION="true"
UDP_FLOOD_LIMIT="60/s"
UDP_FLOOD_BURST="120"

# ICMP / Ping Flood Protection
PING_FLOOD_PROTECTION="true"
PING_LIMIT="5/s"
PING_BURST="10"

# Rate Limit Max Concurrent Connections Per Single IP
MAX_CONN_PER_IP="30"

# Port Scanning Protection & Stealth Drops
DROP_INVALID_PACKETS="true"
DROP_STEALTH_SCANS="true"

# ---------------------------------------------------------------------
# Discord & Webhook Attack Alert Notifications
# ---------------------------------------------------------------------
ENABLE_DISCORD_ALERTS="false"
DISCORD_WEBHOOK_URL=""
ALERT_ON_IP_BLOCK="true"
ALERT_ON_DDOS_SPIKE="true"

# ---------------------------------------------------------------------
# Automated Rule Backups
# ---------------------------------------------------------------------
BACKUP_DIR="/var/backups/uniqueguard"
MAX_BACKUPS_RETAIN="10"

# ---------------------------------------------------------------------
# Logging Configuration
# ---------------------------------------------------------------------
ENABLE_LOGGING="true"
LOG_LIMIT="5/m"
LOG_PREFIX="[UNIQUE-GUARD-DROP] "
