# =====================================================================
# UniqueGuard - Fail2ban Configuration for Pterodactyl & VPS
# Created by: mr-unique
# =====================================================================

[DEFAULT]
bantime  = 3600
findtime = 600
maxretry = 5
banaction = iptables-multiport

# ---------------------------------------------------------------------
# SSH Protection
# ---------------------------------------------------------------------
[sshd]
enabled = true
port    = ssh
logpath = %(sshd_log)s
backend = %(sshd_backend)s
maxretry = 4

# ---------------------------------------------------------------------
# Pterodactyl Panel Login Protection
# ---------------------------------------------------------------------
[pterodactyl-panel]
enabled  = true
port     = http,https
filter   = pterodactyl-panel
logpath  = /var/www/pterodactyl/storage/logs/laravel*.log
maxretry = 5
findtime = 600
bantime  = 7200

# ---------------------------------------------------------------------
# Pterodactyl Wings SFTP Brute Force Protection
# ---------------------------------------------------------------------
[pterodactyl-wings]
enabled  = true
port     = 2022,8080
filter   = pterodactyl-wings
logpath  = /var/log/pterodactyl/wings.log
maxretry = 5
findtime = 300
bantime  = 3600
